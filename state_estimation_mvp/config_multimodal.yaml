seed: 42
device: cuda

paths:
  text_train_csv: Data_files/train_text_only_zeroshot.csv
  text_val_csv: Data_files/val_text_only_zeroshot.csv
  ppg_feature_csv: Data_files/ppg_feature_manifest.csv

model:
  text_model_name: distilbert-base-uncased
  projection_dim: 256
  projection_dropout: 0.1
  ppg_hidden_dim: 128
  fusion_hidden_dim: 256

loss:
  lambda_align: 0.1

train:
  batch_size: 32
  epochs: 10
  learning_rate: 0.0001
  weight_decay: 0.01
  num_workers: 0
  allow_missing_ppg: false
